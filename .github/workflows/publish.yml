name: Publish

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  pull-requests: write
 
jobs:
  publish:
    if: |
      github.event.head_commit.author.name != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crow
        uses: user-with-username/setup-crow@main

      - name: Run crow publish
        run: crow publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}